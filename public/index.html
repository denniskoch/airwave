<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirWAVES</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header bar ── -->
  <header class="app-header">
    <div class="app-logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Air<strong>WAVES</strong></span>
    </div>
    <div class="header-channel" id="headerChannel"></div>
    <div class="header-clocks" id="headerClocks"></div>
  </header>

  <!-- ── Body ── -->
  <div class="app-body">

    <!-- Upper row: video column + news panel -->
    <div class="upper-row">

      <!-- Left: video + now-playing bar -->
      <div class="left-col">
        <div class="video-area">
          <video id="videoPlayer" playsinline autoplay muted></video>
          <div class="ch-bug" id="chBug"></div>
          <div class="video-overlay" id="videoOverlay">
            <div class="spinner"></div>
          </div>
          <canvas id="staticCanvas" class="static-canvas"></canvas>
        </div>

        <div class="volume-bar">
          <button class="vol-btn" id="muteBtn" title="Mute (M)"><i id="volIcon" data-lucide="volume-2"></i></button>
          <input class="vol-slider" id="volSlider" type="range" min="0" max="100" value="100">
          <div class="ch-nav-btns">
            <button class="ch-nav-btn" id="chUpBtn" title="Channel Up (↑)"><i data-lucide="chevron-up"></i></button>
            <button class="ch-nav-btn" id="chDnBtn" title="Channel Down (↓)"><i data-lucide="chevron-down"></i></button>
          </div>
          <button class="epg-btn" id="epgBtn" title="Full Guide (G)">
            <i data-lucide="layout-list"></i>
            <span>GUIDE</span>
          </button>
        </div>

        <div class="now-bar" id="nowBar">
          <img class="nb-art" id="nbArt" src="" alt="" onerror="this.style.display='none'">
          <div class="nb-body">
            <div class="nb-top">
              <span class="nb-title" id="nbTitle">Loading…</span>
              <span class="nb-tags" id="nbTags"></span>
            </div>
            <div class="nb-progress-row">
              <span class="nb-t" id="nbStart"></span>
              <div class="nb-bar"><div class="nb-fill" id="nbFill"></div></div>
              <span class="nb-t" id="nbEnd"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: credits-style news scroller -->
      <div class="news-panel">
        <div class="news-panel-header">
          <span class="news-panel-label">NEWS</span>
          <div class="news-badges" id="newsBadges"></div>
        </div>
        <div class="news-viewport">
          <div class="news-track" id="newsTrack"></div>
        </div>
      </div>

    </div><!-- /upper-row -->

    <!-- Mini EPG: 3 channels, full width -->
    <div class="mini-epg-bar" id="miniEpgBar"></div>

  </div><!-- /app-body -->

  <div class="epg-overlay" id="epgOverlay" hidden>
    <div class="epg-overlay-header">
      <span class="epg-overlay-title">
        <i data-lucide="layout-list"></i>
        PROGRAM GUIDE
      </span>
      <button class="epg-close-btn" id="epgCloseBtn" title="Close (Esc)">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="epg-scroll-wrap" id="epgScrollWrap"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
